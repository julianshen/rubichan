# Rubichan Code Review — GitHub Actions
#
# This workflow runs Rubichan in headless mode on every PR to:
# 1. Post a unified code review comment (LLM analysis + security findings)
# 2. Upload SARIF results to GitHub Code Scanning
# 3. Emit inline annotations for security findings
#
# Required secrets:
#   ANTHROPIC_API_KEY — Your Anthropic API key
#
# GITHUB_TOKEN is automatically provided by GitHub Actions.

name: Rubichan Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for accurate diffs

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install Rubichan
        run: go install github.com/julianshen/rubichan/cmd/rubichan@latest

      - name: Run Code Review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rubichan --headless \
            --mode=code-review \
            --post-to-pr \
            --annotations \
            --output=json \
            --fail-on=high \
            --timeout=300s

      - name: Upload SARIF (Security Findings)
        if: always()
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rubichan --headless \
            --mode=code-review \
            --output=sarif \
            --upload-sarif \
            --timeout=300s
